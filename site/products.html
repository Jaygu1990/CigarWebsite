<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>产品库 · 雪茄老友会</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500;700;900&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/oldguard.css"/>
</head>
<body>
<div class="page">

  <div class="topline"></div>

  <header class="header">
    <a class="brand" href="/">
      <span class="crest" aria-hidden="true">
        <svg viewBox="0 0 48 56" width="40" height="46">
          <path d="M24 2 L44 9 V30 C44 44 35 51 24 54 C13 51 4 44 4 30 V9 Z" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M24 6 L40 11.5 V30 C40 41.5 32.5 47.5 24 50 C15.5 47.5 8 41.5 8 30 V11.5 Z" fill="none" stroke="currentColor" stroke-width="1"/>
          <text x="24" y="35" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="22" font-weight="900" fill="currentColor">友</text>
          <path d="M16 9 q8 -6 16 0" fill="none" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </span>
      <span class="brand-name">雪茄老友会</span>
    </a>

    <nav class="nav">
      <a href="/">首页</a>
      <a class="active" href="/products.html">产品库</a>
      <a href="/shop.html">海淘</a>
      <a href="/#directory">品牌目录</a>
      <a href="#footer">联系我们</a>
    </nav>

    <div class="est">
      <span class="est-line">始于</span>
      <span class="est-year">2021</span>
    </div>
  </header>

  <section class="frame shop-hero">
    <h2 class="section-title">雪茄产品库</h2>
    <p class="section-sub">各站点报价 &middot; 一键比价</p>
    <div class="shop-search">
      <input id="search" placeholder="搜索产品 / 品牌 · 支持中英文"/>
    </div>
  </section>

  <section class="frame">
    <p class="shop-count" id="count"></p>
    <div class="pv-grid" id="list"></div>
    <div id="empty" class="dir-loading hidden">暂无数据</div>
  </section>

  <footer class="footer" id="footer">
    <div class="foot-orn">&#10086; &nbsp; &#9874; &nbsp; &#10086;</div>
    <div class="foot-brand">雪茄老友会</div>
    <div class="foot-tag">自律 &nbsp;&middot;&nbsp; 传承 &nbsp;&middot;&nbsp; 忠诚</div>
  </footer>

</div>

<!-- detail bottom-sheet -->
<div id="overlay" class="pv-overlay"></div>
<div id="sheet" class="pv-sheet">
  <div class="pv-sheet-head">
    <div class="pv-sheet-title">
      <img id="d-img" class="pv-d-img hidden"/>
      <div class="min-w-0">
        <h3 id="d-name" class="pv-d-name"></h3>
        <p id="d-dim" class="pv-d-dim"></p>
        <div id="d-badges" class="pv-badges"></div>
      </div>
    </div>
    <button id="d-close" class="pv-close">关闭</button>
  </div>
  <div id="d-listings" class="pv-listings"></div>
</div>

<script src="/assets/products.js"></script>
</body>
</html>
