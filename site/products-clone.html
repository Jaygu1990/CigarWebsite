<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>产品库 - 秒茄</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="stylesheet" href="/assets/app.css"/>
</head>
<body class="geist_a71539c9-module__T19VSG__variable geist_mono_8d43a2aa-module__8Li5zG__variable antialiased">
<div class="min-h-screen bg-white pb-20">
  <!-- header -->
  <div class="bg-white border-b sticky top-0 z-10">
    <div class="w-full max-w-none px-4 md:max-w-[70%] md:mx-auto py-3 pb-3">
      <div class="flex items-center relative gap-2">
        <div class="relative flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4 z-10" aria-hidden="true"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
          <input id="search" class="border-input flex h-9 w-full min-w-0 rounded-md border bg-transparent shadow-xs outline-none pl-9 pr-4 py-2 text-base focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px]" placeholder="搜索产品、品牌-支持中英文" style="font-size:16px"/>
        </div>
      </div>
    </div>
  </div>

  <!-- product list -->
  <div class="w-full max-w-none px-4 md:max-w-[70%] md:mx-auto py-4">
    <div class="flex justify-between items-center px-1 mb-3">
      <h2 class="text-xl font-medium text-gray-900">产品库</h2>
      <span id="count" class="text-sm text-gray-500"></span>
    </div>
    <div id="list" class="space-y-2"></div>
    <div id="empty" class="hidden text-center text-gray-400 py-16">暂无数据</div>
  </div>
</div>

<!-- detail overlay -->
<div id="overlay" class="fixed inset-0 z-[90] bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"></div>
<div id="sheet" class="fixed inset-x-0 bottom-0 z-[95] bg-white rounded-t-2xl shadow-2xl max-h-[85vh] overflow-y-auto translate-y-full transition-transform duration-300 md:max-w-[70%] md:mx-auto">
  <div class="sticky top-0 bg-white border-b px-4 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <img id="d-img" class="w-12 h-12 object-contain rounded-lg bg-gray-50 border border-gray-100 flex-shrink-0 hidden"/>
      <div class="min-w-0">
        <h3 id="d-name" class="text-base font-semibold text-gray-900 truncate"></h3>
        <p id="d-dim" class="text-xs text-gray-500 mt-0.5"></p>
        <div id="d-badges" class="flex flex-wrap gap-1 mt-1"></div>
      </div>
    </div>
    <button id="d-close" class="text-gray-400 hover:text-gray-700 text-sm px-2 py-1 flex-shrink-0">关闭</button>
  </div>
  <div id="d-listings" class="p-4 space-y-3"></div>
</div>

<!-- bottom nav -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t z-[100]">
  <div class="w-full max-w-none md:max-w-[70%] md:mx-auto">
    <div class="grid grid-cols-5 font-normal relative">
      <button data-nav="/index.html" class="flex flex-col items-center py-2 h-auto cursor-pointer hover:bg-accent">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house w-5 h-5 mb-1 text-gray-400"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span class="text-xs text-gray-400">首页</span>
      </button>
      <button data-nav="/shop.html" class="flex flex-col items-center py-2 h-auto cursor-pointer hover:bg-accent">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart w-5 h-5 mb-1 text-gray-400"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
        <span class="text-xs text-gray-400">海淘</span>
      </button>
      <button data-nav="/products.html" class="flex flex-col items-center py-2 h-auto cursor-pointer hover:bg-accent">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-database w-5 h-5 mb-1 text-black"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>
        <span class="text-xs text-black font-medium">产品库</span>
      </button>
      <button data-nav="#" class="flex flex-col items-center py-2 h-auto cursor-pointer hover:bg-accent">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-compass w-5 h-5 mb-1 text-gray-400"><path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"></path><circle cx="12" cy="12" r="10"></circle></svg>
        <span class="text-xs text-gray-400">补货</span>
      </button>
      <button data-nav="#" class="flex flex-col items-center py-2 h-auto cursor-pointer hover:bg-accent">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user w-5 h-5 mb-1 text-gray-400"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span class="text-xs text-gray-400">我</span>
      </button>
    </div>
  </div>
</div>

<script src="/assets/products.js"></script>
</body>
</html>
