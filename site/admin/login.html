<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>后台登录 - 秒茄</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="stylesheet" href="/assets/app.css"/>
</head>
<body class="geist_a71539c9-module__T19VSG__variable geist_mono_8d43a2aa-module__8Li5zG__variable antialiased">
<div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-400 via-orange-500 to-rose-500 flex items-center justify-center shadow-lg mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-white"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <h1 class="text-xl font-semibold text-gray-900">秒茄后台管理</h1>
      <p class="text-sm text-gray-400 mt-1">请登录以管理产品与报价</p>
    </div>
    <form id="form" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1">用户名</label>
        <input id="username" autocomplete="username" class="border-input flex h-10 w-full rounded-md border bg-transparent px-3 outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px]" placeholder="admin" style="font-size:16px"/>
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">密码</label>
        <input id="password" type="password" autocomplete="current-password" class="border-input flex h-10 w-full rounded-md border bg-transparent px-3 outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px]" placeholder="••••••••" style="font-size:16px"/>
      </div>
      <div id="err" class="hidden text-sm text-red-600"></div>
      <button type="submit" id="submit" class="w-full h-10 rounded-md bg-gray-900 text-white font-medium hover:bg-black active:scale-[0.99] transition">登录</button>
    </form>
  </div>
</div>
<script>
(function(){
  var form=document.getElementById('form'), err=document.getElementById('err'), btn=document.getElementById('submit');
  // if already logged in, go to dashboard
  fetch('/api/me').then(function(r){ if(r.ok) location.href='/admin/'; });
  form.addEventListener('submit', function(e){
    e.preventDefault(); err.classList.add('hidden'); btn.disabled=true; btn.textContent='登录中…';
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      username:document.getElementById('username').value.trim(),
      password:document.getElementById('password').value
    })}).then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
    .then(function(res){
      if(res.ok){ location.href='/admin/'; }
      else { err.textContent=res.d.error||'登录失败'; err.classList.remove('hidden'); btn.disabled=false; btn.textContent='登录'; }
    }).catch(function(){ err.textContent='网络错误'; err.classList.remove('hidden'); btn.disabled=false; btn.textContent='登录'; });
  });
})();
</script>
</body>
</html>
